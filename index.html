<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiHCM Attendance Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e3a5f, #2d6a9f);
      color: white;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header .icon { font-size: 2rem; }

    header h1 { font-size: 1.5rem; font-weight: 600; }
    header p  { font-size: 0.85rem; opacity: 0.8; margin-top: 2px; }

    .stats {
      display: flex;
      gap: 16px;
      padding: 24px 32px 0;
      flex-wrap: wrap;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px 28px;
      flex: 1;
      min-width: 140px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      text-align: center;
    }

    .stat-card .value { font-size: 2rem; font-weight: 700; color: #2d6a9f; }
    .stat-card .label { font-size: 0.8rem; color: #666; margin-top: 4px; }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 32px;
      flex-wrap: wrap;
    }

    .controls input {
      padding: 8px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      background: white;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }
    .filter-btn.active { background: #2d6a9f; color: white; border-color: #2d6a9f; }

    .table-wrap {
      padding: 0 32px 32px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    thead { background: #1e3a5f; color: white; }
    th { padding: 14px 16px; text-align: left; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.3px; }
    td { padding: 12px 16px; font-size: 0.9rem; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge.success { background: #e6f7ee; color: #1a7f4b; }
    .badge.failed  { background: #fde8e8; color: #c0392b; }

    .thumb {
      width: 60px;
      height: 40px;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .thumb:hover { border-color: #2d6a9f; }

    .no-data {
      text-align: center;
      padding: 60px;
      color: #999;
      font-size: 1rem;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 16px;
      max-width: 90vw;
      max-height: 90vh;
      overflow: auto;
      padding: 24px;
      position: relative;
    }

    .modal img { max-width: 100%; border-radius: 8px; display: block; }
    .modal h3  { margin-bottom: 12px; font-size: 1rem; color: #333; }

    .modal-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #666;
    }

    @media (max-width: 600px) {
      header, .stats, .controls, .table-wrap { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="icon">🕐</div>
  <div>
    <h1>MiHCM Attendance Dashboard</h1>
    <p>Muhammad Waqi Anwar — Auto attendance history</p>
  </div>
</header>

<div class="stats">
  <div class="stat-card"><div class="value" id="totalDays">—</div><div class="label">Total Days Logged</div></div>
  <div class="stat-card"><div class="value" id="successDays">—</div><div class="label">Successful</div></div>
  <div class="stat-card"><div class="value" id="failedDays">—</div><div class="label">Failed</div></div>
  <div class="stat-card"><div class="value" id="thisMonth">—</div><div class="label">This Month</div></div>
</div>

<div class="controls">
  <input type="month" id="monthFilter" />
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="success">Success</button>
  <button class="filter-btn" data-filter="failed">Failed</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Day</th>
        <th>Time (PKT)</th>
        <th>Status</th>
        <th>Before</th>
        <th>After</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="7" class="no-data">Loading...</td></tr>
    </tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h3 id="modalTitle"></h3>
    <img id="modalImg" src="" alt="Screenshot" />
  </div>
</div>

<script>
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  let allLogs = [];
  let activeFilter = 'all';

  async function loadLogs() {
    try {
      const res = await fetch('attendance-log.json?t=' + Date.now());
      allLogs = await res.json();
      allLogs.sort((a, b) => new Date(b.date) - new Date(a.date));
      updateStats();
      render();
    } catch {
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="7" class="no-data">No attendance records yet. First run pending.</td></tr>';
    }
  }

  function updateStats() {
    const now = new Date();
    const thisMonthStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    document.getElementById('totalDays').textContent = allLogs.length;
    document.getElementById('successDays').textContent = allLogs.filter(l => l.status === 'success').length;
    document.getElementById('failedDays').textContent = allLogs.filter(l => l.status === 'failed').length;
    document.getElementById('thisMonth').textContent = allLogs.filter(l => l.date.startsWith(thisMonthStr)).length;
  }

  function render() {
    const monthVal = document.getElementById('monthFilter').value;
    let logs = allLogs;

    if (monthVal) logs = logs.filter(l => l.date.startsWith(monthVal));
    if (activeFilter !== 'all') logs = logs.filter(l => l.status === activeFilter);

    if (!logs.length) {
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="7" class="no-data">No records found.</td></tr>';
      return;
    }

    document.getElementById('tableBody').innerHTML = logs.map(log => {
      const d = new Date(log.date);
      const dayName = DAYS[d.getDay()];
      const badge = log.status === 'success'
        ? '<span class="badge success">✅ Success</span>'
        : '<span class="badge failed">❌ Failed</span>';

      const beforeThumb = log.screenshotBefore
        ? `<img class="thumb" src="${log.screenshotBefore}" alt="before" onclick="openModal('${log.screenshotBefore}', 'Before Click — ${log.date}')" />`
        : '—';

      const afterThumb = log.screenshotAfter
        ? `<img class="thumb" src="${log.screenshotAfter}" alt="after" onclick="openModal('${log.screenshotAfter}', 'After Click — ${log.date}')" />`
        : '—';

      return `<tr>
        <td><strong>${log.date}</strong></td>
        <td>${dayName}</td>
        <td>${log.timePKT || '—'}</td>
        <td>${badge}</td>
        <td>${beforeThumb}</td>
        <td>${afterThumb}</td>
        <td style="color:#888;font-size:0.82rem">${log.notes || ''}</td>
      </tr>`;
    }).join('');
  }

  function openModal(src, title) {
    document.getElementById('modalImg').src = src;
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalOverlay').classList.add('open');
  }

  document.getElementById('modalClose').onclick = () =>
    document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalOverlay').onclick = (e) => {
    if (e.target === document.getElementById('modalOverlay'))
      document.getElementById('modalOverlay').classList.remove('open');
  };

  document.getElementById('monthFilter').addEventListener('change', render);

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
    });
  });

  loadLogs();
</script>
</body>
</html>
