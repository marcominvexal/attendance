name: MiHCM Start My Day

on:
  # Auto schedule only (weekdays 03:30 UTC = 08:30 PKT + random 0–15 min)
  schedule:
    - cron: '30 3 * * 1-5'

jobs:
  start-my-day:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Random delay (0–15 minutes, 08:30–08:45 PKT)
        if: github.event_name == 'schedule'
        run: |
          DELAY=$(( RANDOM % 901 ))
          echo "Sleeping for $DELAY seconds (~$(( DELAY / 60 )) min $(( DELAY % 60 )) sec)..."
          sleep $DELAY

      - name: Run Start My Day automation
        env:
          MIHCM_USERNAME: ${{ secrets.MIHCM_USERNAME }}
          MIHCM_PASSWORD: ${{ secrets.MIHCM_PASSWORD }}
        run: node start-my-day.js

      - name: Upload screenshots (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            debug-screenshot.png
            after-click-screenshot.png
          retention-days: 3
          if-no-files-found: ignore
