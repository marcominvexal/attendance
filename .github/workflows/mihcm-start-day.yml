name: MiHCM Start My Day

on:
  # Primary: triggered by cron-job.org at 08:30 PKT (see CRON-SETUP.md)
  repository_dispatch:
    types: [morning-run]
  # Backup: GitHub schedule (may be delayed — morning window guard blocks late runs)
  schedule:
    - cron: '30 8 * * 1-5'
      timezone: Asia/Karachi
    - cron: '35 8 * * 1-5'
      timezone: Asia/Karachi
    - cron: '40 8 * * 1-5'
      timezone: Asia/Karachi
    - cron: '45 8 * * 1-5'
      timezone: Asia/Karachi
  # Manual test anytime
  workflow_dispatch:

permissions:
  contents: write

jobs:
  start-my-day:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Pre-check (morning window + already marked)
        id: skipcheck
        run: |
          SKIP=false
          PKT_NOW=$(TZ='Asia/Karachi' date '+%H:%M')
          DATE=$(TZ='Asia/Karachi' date '+%Y-%m-%d')
          HOUR=$(TZ='Asia/Karachi' date '+%H')
          MIN=$(TZ='Asia/Karachi' date '+%M')
          NOW=$((10#$HOUR * 60 + 10#$MIN))

          # GitHub schedule can fire hours late — never mark outside morning window
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "$NOW" -lt 505 ] || [ "$NOW" -gt 550 ]; then
              echo "Outside 08:25–08:50 PKT. Now: ${PKT_NOW}. Skipping (prevents evening marks)."
              SKIP=true
            fi
          fi

          if [ "$SKIP" = "false" ] && [ -f attendance-log.json ]; then
            SHOULD_SKIP=$(node -e "
              const fs = require('fs');
              const log = JSON.parse(fs.readFileSync('attendance-log.json', 'utf8'));
              const done = log.some(e => e.date === '${DATE}' && e.status === 'success');
              process.stdout.write(done ? 'yes' : 'no');
            ")
            if [ "$SHOULD_SKIP" = "yes" ]; then
              echo "Already marked attendance for ${DATE}. Skipping."
              SKIP=true
            fi
          fi

          if [ "$SKIP" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Running at ${PKT_NOW} PKT on ${DATE}."
          fi

      - name: Set up Node.js
        if: steps.skipcheck.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        if: steps.skipcheck.outputs.skip != 'true'
        run: npm install

      - name: Install Playwright browsers
        if: steps.skipcheck.outputs.skip != 'true'
        run: npx playwright install chromium --with-deps

      - name: Random delay (0–15 min → 08:30–08:45 PKT)
        if: steps.skipcheck.outputs.skip != 'true' && (github.event_name == 'repository_dispatch' || github.event_name == 'schedule')
        run: |
          DELAY=$(( RANDOM % 901 ))
          echo "Sleeping ${DELAY}s (~$(( DELAY / 60 )) min) for random morning time..."
          sleep $DELAY
          echo "Now: $(TZ='Asia/Karachi' date '+%H:%M') PKT"

      - name: Run Start My Day automation
        if: steps.skipcheck.outputs.skip != 'true'
        id: automation
        env:
          MIHCM_USERNAME: ${{ secrets.MIHCM_USERNAME }}
          MIHCM_PASSWORD: ${{ secrets.MIHCM_PASSWORD }}
        run: node start-my-day.js

      - name: Save screenshot and log entry to repo
        if: always() && steps.skipcheck.outputs.skip != 'true'
        run: |
          DATE=$(TZ='Asia/Karachi' date '+%Y-%m-%d')
          TIME=$(TZ='Asia/Karachi' date '+%H:%M')
          STATUS="${{ steps.automation.outcome }}"

          mkdir -p screenshots

          if [ -f "debug-screenshot.png" ]; then
            cp debug-screenshot.png "screenshots/${DATE}-before.png"
          fi
          if [ -f "after-click-screenshot.png" ]; then
            cp after-click-screenshot.png "screenshots/${DATE}-after.png"
          fi

          node -e "
            const fs = require('fs');
            const log = JSON.parse(fs.readFileSync('attendance-log.json', 'utf8'));
            const entry = {
              date: '${DATE}',
              timePKT: '${TIME}',
              status: '${STATUS}',
              screenshotBefore: fs.existsSync('screenshots/${DATE}-before.png') ? 'screenshots/${DATE}-before.png' : null,
              screenshotAfter: fs.existsSync('screenshots/${DATE}-after.png') ? 'screenshots/${DATE}-after.png' : null,
              notes: '${STATUS}' === 'success' ? 'Auto-marked via GitHub Actions' : 'Run failed — check screenshots'
            };
            const filtered = log.filter(l => l.date !== '${DATE}');
            filtered.unshift(entry);
            fs.writeFileSync('attendance-log.json', JSON.stringify(filtered, null, 2));
            console.log('Log updated:', entry);
          "

          git config user.name "MiHCM Bot"
          git config user.email "actions@github.com"
          git add attendance-log.json screenshots/
          git diff --cached --quiet || git commit -m "Attendance log: ${DATE} — ${STATUS}"
          git push origin HEAD:main

      - name: Upload screenshots artifact
        if: always() && steps.skipcheck.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: |
            debug-screenshot.png
            after-click-screenshot.png
          retention-days: 7
          if-no-files-found: ignore
