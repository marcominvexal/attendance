name: MiHCM Start My Day

on:
  schedule:
    - cron: '30 3 * * 1-5'

jobs:
  start-my-day:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Random delay (0–15 minutes, 08:30–08:45 PKT)
        run: |
          DELAY=$(( RANDOM % 901 ))
          echo "Sleeping for $DELAY seconds (~$(( DELAY / 60 )) min $(( DELAY % 60 )) sec)..."
          sleep $DELAY

      - name: Run Start My Day automation
        env:
          MIHCM_USERNAME: ${{ secrets.MIHCM_USERNAME }}
          MIHCM_PASSWORD: ${{ secrets.MIHCM_PASSWORD }}
        run: node start-my-day.js

      - name: Send email with screenshot
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "MiHCM Attendance — ${{ job.status == 'success' && '✅ Done' || '❌ Failed' }} — ${{ github.run_id }}"
          to: waqi.anwer@invexal.com
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            MiHCM Start My Day ran on ${{ github.run_id }}.
            Status: ${{ job.status }}
            Time: $(date)

            Screenshots attached.
          attachments: after-click-screenshot.png,debug-screenshot.png
