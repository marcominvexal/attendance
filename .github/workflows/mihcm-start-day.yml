name: MiHCM Start My Day

on:
  schedule:
    # Runs at 03:30 UTC (08:30 PKT) Mon-Fri
    - cron: '30 3 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  start-my-day:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Start My Day automation
        env:
          MIHCM_USERNAME: ${{ secrets.MIHCM_USERNAME }}
          MIHCM_PASSWORD: ${{ secrets.MIHCM_PASSWORD }}
        run: node start-my-day.js

      - name: Upload screenshots (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            debug-screenshot.png
            after-click-screenshot.png
          retention-days: 3
          if-no-files-found: ignore
