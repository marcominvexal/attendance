name: MiHCM Start My Day

on:
  schedule:
    # 03:30 UTC = 08:30 PKT, Mon–Fri
    - cron: '30 3 * * 1-5'
  workflow_dispatch:

jobs:
  start-my-day:
    # Runs on GitHub-hosted runner.
    # For Pakistan routing, configure MIHCM_PROXY_SERVER (+ optional auth).
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Start My Day automation
        env:
          MIHCM_USERNAME: ${{ secrets.MIHCM_USERNAME }}
          MIHCM_PASSWORD: ${{ secrets.MIHCM_PASSWORD }}
          MIHCM_PROXY_SERVER: ${{ secrets.MIHCM_PROXY_SERVER }}
          MIHCM_PROXY_USERNAME: ${{ secrets.MIHCM_PROXY_USERNAME }}
          MIHCM_PROXY_PASSWORD: ${{ secrets.MIHCM_PROXY_PASSWORD }}
        run: node start-my-day.js

      - name: Upload End My Day screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: end-my-day-screenshot
          path: end-my-day-screenshot.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload debug screenshot (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug-screenshot.png
          if-no-files-found: ignore
          retention-days: 3
